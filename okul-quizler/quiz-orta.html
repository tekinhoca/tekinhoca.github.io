<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ortaokul Matematik Quiz - Tekin Hoca</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #12100e; --gold: #c8960c; --cream: #f7f2e8; --rust: #9b3510; --aged: #ece4cc; --sepia: #5d4037; }
        body { font-family: 'Source Serif 4', serif; background-color: var(--cream); color: var(--ink); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header-bar { width: 100%; max-width: 800px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .header-bar h2 { font-family: 'Playfair Display', serif; color: var(--rust); margin: 0; font-size: 1.5rem; }
        .exit-btn { background: var(--rust); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
        #quiz-card { background: var(--aged); width: 100%; max-width: 700px; padding: 35px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid rgba(122,92,30,0.2); position: relative; }
        .q-meta { font-weight: 600; color: var(--sepia); margin-bottom: 15px; font-size: 0.95rem; border-bottom: 1px solid var(--gold); display: block; padding-bottom: 5px; }
        .q-text { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 25px; line-height: 1.5; }
        .options-grid { display: grid; gap: 12px; }
        .opt-btn { background: var(--cream); border: 1px solid rgba(122,92,30,0.3); padding: 16px; text-align: left; font-size: 1.1rem; cursor: pointer; transition: 0.2s; font-family: inherit; }
        .opt-btn:hover:not(:disabled) { border-color: var(--gold); background: #fff; }
        .correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: 600; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        #hint-box { margin-top: 25px; padding: 18px; border-left: 5px solid var(--gold); background: rgba(255,255,255,0.6); display: none; font-size: 1.05rem; line-height: 1.6; }
        #nav-btn { margin-top: 25px; width: 100%; padding: 16px; background: var(--rust); color: white; border: none; font-weight: 700; cursor: pointer; display: none; text-transform: uppercase; }
        #result-screen { display: none; text-align: center; }
        #result-screen h2 { font-family: 'Playfair Display', serif; color: var(--rust); font-size: 1.8rem; margin-bottom: 10px; }
        #score-display { font-size: 2.5rem; color: var(--ink); font-family: 'Playfair Display', serif; margin: 10px 0; font-weight: bold; }
        .analysis-table { width: 100%; border-collapse: collapse; margin-top: 25px; background: #fff; text-align: left; }
        .analysis-table th, .analysis-table td { padding: 12px; border: 1px solid var(--aged); font-size: 0.95rem; }
        .analysis-table th { background: var(--ink); color: var(--gold); }
        .status-true { color: #28a745; font-weight: bold; }
        .status-false { color: #dc3545; font-weight: bold; }
        .restart-btn { margin-top: 25px; width: 100%; padding: 18px; background: var(--ink); color: var(--gold); border: none; font-weight: 700; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="header-bar">
    <h2>ORTAOKUL MATEMATİK QUİZ</h2>
    <button class="exit-btn" onclick="window.close()">QUİZDEN ÇIK</button>
</div>

<div id="quiz-card">
    <div id="play-area">
        <div id="q-info" class="q-meta"></div>
        <div id="q-content" class="q-text"></div>
        <div id="options-area" class="options-grid"></div>
        <div id="hint-box"></div>
        <button id="nav-btn" onclick="handleNext()"></button>
    </div>

    <div id="result-screen">
        <h2>Performans Analizi</h2>
        <div id="score-display"></div>
        <table class="analysis-table">
            <thead>
                <tr><th>Sıra</th><th>Kazanım Alanı</th><th>Başarı Durumu</th></tr>
            </thead>
            <tbody id="analysis-body"></tbody>
        </table>
        <button class="restart-btn" onclick="startNewQuiz()">YENİ QUİZ BAŞLAT</button>
    </div>
</div>

        {q:"'Bir yolun 100 eksiğinin yarısı' cebirsel ifade şeklinde nasıl yazılabilir?", a:["x/2-100","(x-100)/2","100x-2","x-50"], c:1, s:"Önce 100 eksiği paranteze alınır: (x-100), sonra parantez 2'ye bölünür."},

        {q:"'Bir sayının yarısının 6 fazlası' cebirsel ifade şeklinde nasıl yazılabilir?", a:["(x+6)/2","x/2+6","2x+6","x/2-6"], c:1, s:"Önce yarısı (x/2) alınır, ardından 6 eklenir."},

const TOPICS = [
    {t:"Cebirsel İfadeler", s:"6. Sınıf"}, {t:"Örüntüler", s:"6. Sınıf"}, {t:"Yüzdeler I", s:"7. Sınıf"},
    {t:"Doğrusal İlişkiler", s:"8. Sınıf"}, {t:"Eğim I", s:"8. Sınıf"}, {t:"Eşitsizlikler", s:"8. Sınıf"},
    {t:"Üçgen İlişkileri", s:"8. Sınıf"}, {t:"Pisagor Bağıntısı", s:"8. Sınıf"}, {t:"Yüzdeler II", s:"7. Sınıf"}, {t:"Eğim II", s:"8. Sınıf"}
];

let currentQuestions = []; let qIdx = 0; let score = 0; let results = [];

function getUsedHistory() {
    return JSON.parse(localStorage.getItem('quiz_history') || '{"c1":[],"c2":[],"c3":[],"c4":[],"c5":[],"c6":[],"c7":[],"c8":[],"c9":[],"c10":[]}');
}

function saveUsedHistory(hist) {
    localStorage.setItem('quiz_history', JSON.stringify(hist));
}

function startNewQuiz() {
    currentQuestions = []; results = []; qIdx = 0; score = 0;
    let history = getUsedHistory();

    for(let i=1; i<=10; i++) {
        let cat = 'c' + i;
        let pool = quizPool[cat];
        let used = history[cat];

        let availableIndices = pool.map((_, idx) => idx).filter(idx => !used.includes(idx));
        
        // Eğer tüm sorular bittiyse o kategori için geçmişi sıfırla
        if(availableIndices.length === 0) {
            availableIndices = pool.map((_, idx) => idx);
            history[cat] = [];
        }

        let randomIdx = availableIndices[Math.floor(Math.random() * availableIndices.length)];
        currentQuestions.push(pool[randomIdx]);
        history[cat].push(randomIdx);
    }

    saveUsedHistory(history);
    document.getElementById('play-area').style.display = 'block';
    document.getElementById('result-screen').style.display = 'none';
    showQuestion();
}

function showQuestion() {
    const data = currentQuestions[qIdx];
    const topicInfo = TOPICS[qIdx];
    document.getElementById('q-info').innerText = `SORU: ${qIdx+1}/10 - ${topicInfo.t.toUpperCase()} (${topicInfo.s})`;
    document.getElementById('q-content').innerHTML = data.q;
    
    const area = document.getElementById('options-area');
    area.innerHTML = '';
    document.getElementById('hint-box').style.display = 'none';
    
    const navBtn = document.getElementById('nav-btn');
    navBtn.style.display = 'none';
    navBtn.innerText = (qIdx === 9) ? "QUIZ BİTTİ. ANALİZİ GÖR." : "SIRADAKİ SORU";

    data.a.forEach((txt, i) => {
        const b = document.createElement('button');
        b.className = 'opt-btn';
        b.innerHTML = txt;
        b.onclick = () => {
            const btns = document.querySelectorAll('.opt-btn');
            btns.forEach(btn => btn.disabled = true);
            let isCorrect = (i === data.c);
            results.push(isCorrect);
            if(isCorrect) { 
                b.classList.add('correct'); 
                score++; 
            } else { 
                b.classList.add('wrong'); 
                btns[data.c].classList.add('correct'); 
                document.getElementById('hint-box').innerHTML = `<strong>Çözüm:</strong> ${data.s}`;
                document.getElementById('hint-box').style.display = 'block'; 
            }
            navBtn.style.display = 'block';
            MathJax.typesetPromise();
        };
        area.appendChild(b);
    });
    MathJax.typesetPromise();
}

function handleNext() {
    if(qIdx < 9) { qIdx++; showQuestion(); }
    else { finish(); }
}

function finish() {
    document.getElementById('play-area').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('score-display').innerText = `${score} / 10`;
    const tbody = document.getElementById('analysis-body');
    tbody.innerHTML = '';
    TOPICS.forEach((topic, i) => {
        tbody.innerHTML += `<tr><td>${i+1}</td><td>${topic.t}</td><td class="status-${results[i]}">${results[i] ? 'BAŞARILI' : 'GELİŞTİRİLMELİ'}</td></tr>`;
    });
}

// İlk başlatma
startNewQuiz();
