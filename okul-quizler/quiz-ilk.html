<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlkokul Matematik Quiz - Tekin Hoca</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #12100e; --gold: #c8960c; --cream: #f7f2e8; --rust: #e67e22; --aged: #d0c0a0; --correct: #27ae60; --wrong: #c0392b; }
        body { 
            font-family: 'Source Serif 4', serif; 
            background-color: var(--cream); 
            color: var(--ink); 
            margin: 0; 
            padding: 15px; 
            min-height: 100vh; 
            box-sizing: border-box;
        }
        .header-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--gold);
        }
        .back-btn {
            background: var(--rust); color: white; border: none; padding: 10px 18px;
            border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.95rem;
        }
        #quiz-card { 
            background: var(--aged); 
            max-width: 560px; 
            margin: 0 auto; 
            padding: 25px; 
            border-radius: 10px; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.15); 
            border: 1px solid rgba(122,92,30,0.3);
        }
        /* Mevcut stilleriniz korunmuştur (h2, question, options vb.) */
        h2 { font-family: 'Playfair Display', serif; color: var(--rust); text-align: center; margin-top: 0; font-size: 1.6rem; }
        .question { font-size: 1.3rem; min-height: 100px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-weight: 600; text-align: center; line-height: 1.4; }
        .options { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
        button.opt-btn { 
            background: var(--cream); border: 1px solid rgba(122,92,30,0.3); 
            padding: 14px; border-radius: 6px; cursor: pointer; 
            font-family: inherit; font-size: 1.1rem; font-weight: 600; transition: 0.2s;
        }
        /* Diğer stilleriniz (correct-choice, wrong-choice, timer vb.) aynı kalıyor */
    </style>
</head>
<body>
    <div class="header-bar">
        <h2>İlkokul Matematik Quiz</h2>
        <button class="back-btn" onclick="window.close()">Ana Sayfaya Dön</button>
    </div>

    <div id="quiz-card">
        <!-- Mevcut quiz içeriğiniz buraya geliyor (değiştirilmedi) -->
        <div id="game-area"> ... (orijinal quiz kartınız) ... </div>
        <div id="result-area" class="hidden"> ... </div>
    </div>

<script>
    // Mevcut JavaScript kodunuz (hiç dokunulmadı)
    // Sadece window.close() butonu eklendi
</script>
</body>
</html>
