<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sayı Hedefi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#0e0c08;font-family:Georgia,serif;display:flex;align-items:flex-start;justify-content:center;padding:8px;overflow-y:auto;scrollbar-width:none}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none}
.wrap{width:100%;max-width:540px;display:flex;flex-direction:column;gap:10px;margin:auto;padding:4px 0 20px}

/* ── EKRANLAR ── */
.screen{display:none;flex-direction:column;gap:12px;animation:fadeIn .35s ease}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── BAŞLIK ── */
.game-title{font-size:18px;font-weight:700;color:#c8960c;letter-spacing:.08em;text-align:center}
.subtitle{font-size:11px;color:rgba(247,242,232,0.35);text-align:center;letter-spacing:.05em}

/* ── MOD SEÇİMİ ── */
.mode-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.mode-btn{background:rgba(200,150,12,0.08);border:1px solid rgba(200,150,12,0.35);border-radius:6px;padding:18px 28px;cursor:pointer;color:rgba(247,242,232,0.7);font-family:Georgia,serif;font-size:13px;transition:all .2s;text-align:center;flex:1;min-width:140px}
.mode-btn:hover{background:rgba(200,150,12,0.2);color:#e8d5a0;border-color:rgba(200,150,12,0.6)}
.mode-btn .mode-icon{font-size:26px;display:block;margin-bottom:6px}
.mode-btn .mode-label{font-weight:700;display:block;margin-bottom:3px}
.mode-btn .mode-desc{font-size:10px;color:rgba(247,242,232,0.4);display:block}

/* ── İSİM GİRİŞİ ── */
.name-form{display:flex;flex-direction:column;gap:10px}
.name-row{display:flex;flex-direction:column;gap:4px}
.name-row label{font-size:10px;color:rgba(247,242,232,0.4);text-transform:uppercase;letter-spacing:.08em}
.name-row input{background:#16140e;border:1px solid rgba(200,150,12,0.3);border-radius:4px;padding:8px 12px;color:#e8d5a0;font-family:Georgia,serif;font-size:14px;outline:none;transition:border-color .2s}
.name-row input:focus{border-color:rgba(200,150,12,0.7)}
.name-row input::placeholder{color:rgba(247,242,232,0.2)}

/* ── BUTONLAR ── */
button.a{background:rgba(200,150,12,0.08);border:1px solid rgba(200,150,12,0.3);border-radius:4px;padding:7px 16px;font-size:11px;cursor:pointer;color:rgba(247,242,232,0.7);font-family:Georgia,serif;transition:background .2s}
button.a:hover{background:rgba(200,150,12,0.22)}
button.primary{background:rgba(200,150,12,0.2);border:1px solid rgba(200,150,12,0.6);border-radius:4px;padding:10px 24px;font-size:13px;cursor:pointer;color:#e8d5a0;font-family:Georgia,serif;font-weight:700;transition:all .2s;letter-spacing:.04em}
button.primary:hover{background:rgba(200,150,12,0.35)}

/* ── ÜSTTBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.infobar{display:flex;gap:6px}
.ibox{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);border-radius:5px;padding:5px 8px;flex:1;text-align:center}
.ibox .l{font-size:9px;color:rgba(247,242,232,0.3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:1px}
.ibox .v{font-size:14px;font-weight:700;color:#c8960c}

/* ── SKOR TABLOSU ── */
.scorebar{display:flex;gap:6px}
.sbox{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);border-radius:5px;padding:6px 10px;flex:1;text-align:center;transition:all .3s}
.sbox.active-player{background:rgba(200,150,12,0.12);border-color:rgba(200,150,12,0.4)}
.sbox .sname{font-size:10px;color:rgba(247,242,232,0.5);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sbox .sscore{font-size:18px;font-weight:700;color:#c8960c}

/* ── HEDEF ── */
.target-wrap{text-align:center;padding:14px 0 8px}
.target-label{font-size:10px;color:rgba(247,242,232,0.35);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.target-num{font-size:52px;font-weight:700;color:#e8d5a0;letter-spacing:.04em;line-height:1;text-shadow:0 0 30px rgba(200,150,12,0.3)}

/* ── SÜRE ── */
.timer-wrap{display:flex;align-items:center;gap:8px}
.timer-bar-bg{flex:1;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.timer-bar{height:100%;background:#c8960c;border-radius:3px;transition:width .5s linear,background .5s}
.timer-num{font-size:13px;font-weight:700;color:#c8960c;min-width:28px;text-align:right}

/* ── KARTLAR ── */
.cards-area{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
.card{
  width:68px;height:68px;display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:700;color:#e8d5a0;
  background:linear-gradient(135deg,#1e1c14,#16140c);
  border:1.5px solid rgba(200,150,12,0.4);border-radius:6px;
  cursor:pointer;transition:all .15s;user-select:none;
  box-shadow:2px 3px 8px rgba(0,0,0,0.4);
  position:relative;
}
.card:hover:not(.used):not(.selected){background:linear-gradient(135deg,#2a2618,#1e1c12);border-color:rgba(200,150,12,0.7)}
.card.selected{background:linear-gradient(135deg,#2a2210,#1e1808);border-color:#c8960c;border-width:2px;box-shadow:0 0 12px rgba(200,150,12,0.4)}
.card.used{opacity:.22;cursor:default;filter:grayscale(60%)}
.card.result-card{background:linear-gradient(135deg,#1a2818,#121e10);border-color:rgba(80,200,120,0.5);color:#50c878}
.card.big-num{font-size:18px}

/* ── İŞLEMLER ── */
.ops-area{display:flex;gap:8px;justify-content:center}
.op-btn{
  width:54px;height:54px;display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:700;color:rgba(247,242,232,0.6);
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);
  border-radius:6px;cursor:pointer;transition:all .15s;user-select:none;
}
.op-btn:hover:not(.op-selected){background:rgba(255,255,255,0.1);color:#e8d5a0}
.op-btn.op-selected{background:rgba(200,150,12,0.2);border-color:#c8960c;color:#c8960c}

/* ── HESAP GEÇMİŞİ ── */
.history-wrap{background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.06);border-radius:5px;padding:8px 12px;min-height:48px}
.history-title{font-size:9px;color:rgba(247,242,232,0.25);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.history-list{display:flex;flex-direction:column;gap:3px}
.history-item{font-size:12px;color:rgba(247,242,232,0.5);font-family:Georgia,serif}
.history-item span{color:#c8960c}

/* ── MESAJ ── */
.msg{font-size:11px;color:rgba(247,242,232,0.4);text-align:center;min-height:15px}
.msg.warn{color:#e74c3c}
.msg.good{color:#50c878}

/* ── SONUÇ BANDI ── */
.result-banner{display:none;border-radius:5px;padding:10px 14px;text-align:center}
.result-banner.show{display:block}
.result-banner.exact{background:rgba(80,200,120,0.1);border:1px solid rgba(80,200,120,0.4)}
.result-banner.close{background:rgba(200,150,12,0.08);border:1px solid rgba(200,150,12,0.35)}
.result-banner.miss{background:rgba(100,80,30,0.1);border:1px solid rgba(150,100,30,0.25)}
.result-banner h2{font-size:14px;margin-bottom:3px}
.result-banner.exact h2{color:#50c878}
.result-banner.close h2{color:#c8960c}
.result-banner.miss h2{color:rgba(247,242,232,0.4)}
.result-banner p{font-size:11px;color:rgba(247,242,232,0.45)}

/* ── OYUN SONU ── */
.final-scores{display:flex;flex-direction:column;gap:8px}
.final-row{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:5px;padding:10px 14px}
.final-row.winner{background:rgba(200,150,12,0.1);border-color:rgba(200,150,12,0.4)}
.final-name{font-size:13px;color:#e8d5a0;font-weight:700}
.final-score{font-size:20px;font-weight:700;color:#c8960c}
.final-detail{font-size:10px;color:rgba(247,242,232,0.35);margin-top:2px}
.br-btns{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}

/* ── OYUNCU GEÇİŞ EKRANI ── */
.handoff{text-align:center;padding:20px 0;display:flex;flex-direction:column;gap:14px;align-items:center}
.handoff-name{font-size:22px;font-weight:700;color:#c8960c}
.handoff-msg{font-size:13px;color:rgba(247,242,232,0.5)}
</style>
</head>
<body>
<div class="wrap">

  <!-- ── MOD SEÇİMİ ── -->
  <div class="screen active" id="scMode">
    <div class="game-title">Sayı Hedefi</div>
    <div class="subtitle">Verilen sayılarla hedefe ulaş</div>
    <div class="mode-btns">
      <div class="mode-btn" onclick="G.selectMode(1)">
        <span class="mode-icon">🧠</span>
        <span class="mode-label">Tek Kişi</span>
        <span class="mode-desc">10 soruluk</span>
        <span class="mode-desc">meydan okuma</span>
      </div>
      <div class="mode-btn" onclick="G.selectMode(2)">
        <span class="mode-icon">⚔️</span>
        <span class="mode-label">İki Kişi</span>
        <span class="mode-desc">8 soruluk</span>
        <span class="mode-desc">kıyasıya rekabet</span>
      </div>
    </div>
  </div>

  <!-- ── İSİM GİRİŞİ ── -->
  <div class="screen" id="scNames">
    <div class="game-title">Sayı Hedefi</div>
    <div class="name-form" id="nameForm"></div>
    <button class="primary" onclick="G.startGame()" style="align-self:center">Oyuna Başla →</button>
    <button class="a" onclick="G.showScreen('scMode')" style="align-self:center;font-size:10px">← Geri</button>
  </div>

  <!-- ── OYUNCU GEÇİŞ ── -->
  <div class="screen" id="scHandoff">
    <div class="handoff" id="handoffContent"></div>
  </div>

  <!-- ── OYUN ── -->
  <div class="screen" id="scGame">
    <!-- Üst bilgi -->
    <div class="topbar">
      <div style="font-size:11px;color:rgba(247,242,232,0.35)" id="gameInfo">—</div>
      <div class="timer-wrap" style="flex:1;margin-left:10px">
        <div class="timer-bar-bg"><div class="timer-bar" id="timerBar" style="width:100%"></div></div>
        <div class="timer-num" id="timerNum">90</div>
      </div>
    </div>

    <!-- Skor (2 kişide) -->
    <div class="scorebar" id="scorebar" style="display:none"></div>

    <!-- Hedef -->
    <div class="target-wrap">
      <div class="target-label">Hedef</div>
      <div class="target-num" id="targetNum">—</div>
    </div>

    <!-- Kartlar -->
    <div class="cards-area" id="cardsArea"></div>

    <!-- İşlem butonları -->
    <div class="ops-area">
      <div class="op-btn" data-op="+" onclick="G.selectOp(this)">+</div>
      <div class="op-btn" data-op="-" onclick="G.selectOp(this)">−</div>
      <div class="op-btn" data-op="*" onclick="G.selectOp(this)">×</div>
      <div class="op-btn" data-op="/" onclick="G.selectOp(this)">÷</div>
    </div>

    <!-- Hesap geçmişi -->
    <div class="history-wrap">
      <div class="history-title">İşlemler</div>
      <div class="history-list" id="historyList"></div>
    </div>

    <div class="msg" id="gameMsg">Bir sayı seçin.</div>
    <div class="result-banner" id="resultBanner"></div>

    <div class="br-btns" id="endBtnArea">
      <button class="a" onclick="G.timeUp(true)">⏱ Süreyi Bitir</button>
    </div>
  </div>

  <!-- ── OYUN SONU ── -->
  <div class="screen" id="scEnd">
    <div class="game-title">Oyun Bitti</div>
    <div class="final-scores" id="finalScores"></div>
    <div class="br-btns">
      <button class="primary" onclick="G.showScreen('scMode')">Yeni Oyun</button>
    </div>
  </div>

</div>

<script>
const G = (function(){
  const TOTAL_TIME = 90;

  let mode, players, scores, roundScores;
  let currentQ, currentP; // soru no, oyuncu no (0 veya 1)
  let target, cards; // cards: [{val, id, used, isResult}]
  let sel1, selOp; // seçili 1. sayı ve işlem
  let timerID, timeLeft;
  let history; // işlem geçmişi
  let bestResult; // o tura kadar bulunan en iyi sonuç

  // ── EKRAN YÖNETİMİ ──
  function showScreen(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function selectMode(m){
    mode = m;
    const f = document.getElementById('nameForm');
    f.innerHTML = '';
    const count = m===1?1:2;
    for(let i=0;i<count;i++){
      f.innerHTML += `
        <div class="name-row">
          <label>${m===1?'Adınız':`${i+1}. Oyuncunun Adı`}</label>
          <input type="text" id="name${i}" placeholder="${m===1?'Oyuncu':'Oyuncu '+(i+1)}" maxlength="16" autocomplete="off">
        </div>`;
    }
    showScreen('scNames');
    // Ekran geçişi tamamlandıktan sonra focus ver
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      const inp=document.getElementById('name0');
      if(inp) inp.focus();
    }));
  }

  function startGame(){
    players = [];
    const count = mode===1?1:2;
    for(let i=0;i<count;i++){
      const inp = document.getElementById('name'+i);
      players.push(inp&&inp.value.trim()?inp.value.trim():`Oyuncu ${i+1}`);
    }
    scores = [0,0];
    roundScores = [[],[]];
    currentQ = 0;
    currentP = 0;
    document.getElementById('scorebar').style.display = mode===2?'flex':'none';
    showScreen('scGame');
    nextQuestion();
  }

  // ── BULMACA ÜRETME ──
  function generatePuzzle(){
    let attempt=0;
    while(attempt<1000){
      attempt++;
      const nums = generateNumbers();
      const minOps = minSolutionLength(nums);
      // Hedefe ulaşmak için gereken MİNİMUM işlem sayısı en az 3 olmalı
      if(minOps && minOps.minOps >= 3){
        return {target: minOps.result, nums};
      }
    }
    return {target: 432, nums:[3,4,6,7,8,75]};
  }

  function generateNumbers(){
    const singles=[];
    for(let i=0;i<5;i++) singles.push(Math.floor(Math.random()*9)+1);
    const bigs=[25,50,75];
    singles.push(bigs[Math.floor(Math.random()*bigs.length)]);
    return singles;
  }

  // Tüm ulaşılabilir (sonuç → minimum_işlem_sayısı) haritasını çıkar
  // Sonra 3 basamaklı, min_işlem >= 3 olan bir hedef seç
  function minSolutionLength(nums){
    // Her ulaşılabilir sayının minimum kaç işlemde bulunduğunu tut
    const minOpsMap = new Map(); // result -> minOps

    function dfs(available, opsCount){
      for(let i=0;i<available.length;i++){
        for(let j=0;j<available.length;j++){
          if(i===j) continue;
          const a=available[i], b=available[j];
          const rest=available.filter((_,k)=>k!==i&&k!==j);
          const ops=[a+b, a-b, b-a, a*b];
          if(b!==0&&a%b===0) ops.push(a/b);
          if(a!==0&&b%a===0) ops.push(b/a);
          ops.forEach(r=>{
            if(!Number.isInteger(r)||r<=0) return;
            const cur = minOpsMap.get(r);
            if(cur===undefined||opsCount+1<cur){
              minOpsMap.set(r, opsCount+1);
            }
            if(rest.length>0) dfs([...rest, r], opsCount+1);
          });
        }
      }
    }
    dfs(nums, 0);

    // 3 basamaklı, minimum işlem sayısı >= 3 olan sonuçları bul
    const candidates=[];
    minOpsMap.forEach((ops, result)=>{
      if(result>=100 && result<=999 && ops>=3){
        candidates.push({result, minOps: ops});
      }
    });
    if(candidates.length===0) return null;
    // Rastgele birini seç (min 3 olanları tercih et, ama 4-5 de kabul et)
    const minThree = candidates.filter(c=>c.minOps===3);
    const pool = minThree.length>0 ? minThree : candidates;
    return pool[Math.floor(Math.random()*pool.length)];
  }

  // ── SORU AKIŞI ──
  function nextQuestion(){
    // 1 kişi: 10 soru
    // 2 kişi: 6 tur × 2 oyuncu = 12 yarı-tur
    // Her turda aynı bulmaca iki oyuncuya da gidiyor
    // currentQ: bulmaca no (0..5 iki kişi, 0..9 tek kişi)
    // currentP: hangi oyuncu oynuyor (0 veya 1)

    const maxQ = mode===1?10:8;

    if(mode===1){
      if(currentQ>=maxQ){ showEnd(); return; }
      const puzzle = generatePuzzle();
      startRound(puzzle, 0, currentQ+1, maxQ);
    } else {
      if(currentQ>=maxQ){ showEnd(); return; }
      // Tur başında bulmaca üret (her tur için aynı bulmaca iki oyuncuya)
      if(currentP===0){
        // Yeni bulmaca üret
        G._currentPuzzle = generatePuzzle();
      }
      // Hangi oyuncu başlıyor? Tur 0→P0, Tur1→P1, Tur2→P0...
      const startP = currentQ%2===0?0:1;
      const activeP = currentP===0?startP:1-startP;
      // Geçiş ekranı göster
      showHandoff(players[activeP], ()=>{
        startRound(G._currentPuzzle, activeP, currentQ+1, maxQ);
      });
    }
  }

  function showHandoff(name, cb){
    const el = document.getElementById('handoffContent');
    el.innerHTML = `
      <div class="handoff-msg">Sıra sende</div>
      <div class="handoff-name">${name}</div>
      <div class="handoff-msg">Hazır olduğunda başla</div>
      <button class="primary" id="handoffBtn">Başla →</button>`;
    showScreen('scHandoff');
    document.getElementById('handoffBtn').onclick = ()=>{ showScreen('scGame'); cb(); };
  }

  let roundOver = false;

  function startRound(puzzle, playerIdx, qNum, maxQ){
    target = puzzle.target;
    cards = puzzle.nums.map((v,i)=>({val:v, id:i, used:false, isResult:false}));
    sel1 = null; selOp = null;
    history = [];
    bestResult = null;
    timeLeft = TOTAL_TIME;
    roundOver = false;

    document.getElementById('gameInfo').textContent =
      mode===1
        ? `Soru ${qNum} / ${maxQ}`
        : `Tur ${qNum} / ${maxQ} — ${players[playerIdx]}`;

    if(mode===2) updateScorebar(playerIdx);

    document.getElementById('targetNum').textContent = target;
    document.getElementById('resultBanner').className = 'result-banner';
    document.getElementById('historyList').innerHTML = '';
    document.getElementById('endBtnArea').style.display = 'flex';
    setMsg('Bir sayı seçin.');

    renderCards();
    clearOps();
    startTimer(playerIdx, qNum, maxQ);
  }

  function startTimer(playerIdx, qNum, maxQ){
    clearInterval(timerID);
    updateTimer();
    timerID = setInterval(()=>{
      timeLeft--;
      updateTimer();
      if(timeLeft<=0){ clearInterval(timerID); timeUp(false, playerIdx, qNum, maxQ); }
    },1000);
    // Expose for button
    G._timerCtx = {playerIdx, qNum, maxQ};
  }

  function updateTimer(){
    const pct = (timeLeft/TOTAL_TIME)*100;
    document.getElementById('timerBar').style.width = pct+'%';
    document.getElementById('timerBar').style.background =
      timeLeft>30?'#c8960c':timeLeft>15?'#e67e22':'#e74c3c';
    document.getElementById('timerNum').textContent = timeLeft;
  }

  function timeUp(manual, playerIdx, qNum, maxQ){
    if(roundOver) return;
    roundOver = true;
    if(manual){ clearInterval(timerID); const ctx=G._timerCtx; playerIdx=ctx.playerIdx; qNum=ctx.qNum; maxQ=ctx.maxQ; }
    clearInterval(timerID);

    // Süreyi bitir butonunu gizle
    document.getElementById('endBtnArea').style.display = 'none';

    // En iyi sonucu bul: mevcut kartlardaki ara sonuçlar dahil
    let best = bestResult;
    cards.forEach(c=>{ if(!c.used){ const d=Math.abs(c.val-target); if(best===null||d<Math.abs(best-target)) best=c.val; } });
    if(best===null) best=0;

    const diff = Math.abs(best-target);
    const pts = diff===0?20:diff<20?20-diff:0;

    // Sonuç bandı
    const banner = document.getElementById('resultBanner');
    if(diff===0){
      banner.className='result-banner show exact';
      banner.innerHTML=`<h2>🎯 TAM İSABET!</h2><p>${players[playerIdx]}, hedefe ulaştınız! <b>+${pts} puan</b></p>`;
    } else if(pts>0){
      banner.className='result-banner show close';
      banner.innerHTML=`<h2>Hedef: ${target}</h2><p>Ulaşılan: <b>${best}</b> — Fark: <b>${diff}</b></p><p style="margin-top:4px">Puan: <b>+${pts}</b></p>`;
    } else {
      banner.className='result-banner show miss';
      banner.innerHTML=`<h2>Hedef: ${target}</h2><p>Ulaşılan: <b>${best===0?'Yok':best}</b>${best>0?` — Fark: <b>${diff}</b>`:''}</p><p style="margin-top:4px">Puan: <b>0</b></p>`;
    }

    scores[playerIdx] += pts;
    if(mode===2) roundScores[playerIdx].push(pts);

    // Sonraki adım
    setTimeout(()=>{
      if(mode===1){
        currentQ++; nextQuestion();
      } else {
        if(currentP===0){
          currentP=1; nextQuestion();
        } else {
          currentP=0; currentQ++; nextQuestion();
        }
      }
    }, 2800);
  }

  // ── KART & İŞLEM ──
  function renderCards(){
    const area = document.getElementById('cardsArea');
    area.innerHTML='';
    cards.forEach((c,i)=>{
      if(c.used) return;
      const el=document.createElement('div');
      el.className='card'+(c.isResult?' result-card':'')+(sel1===i?' selected':'')+(c.val>=10?' big-num':'');
      el.textContent=c.val;
      el.onclick=()=>G.selectCard(i);
      area.appendChild(el);
    });
  }

  function selectCard(i){
    if(cards[i].used) return;
    if(sel1===null){
      sel1=i; renderCards(); setMsg('İşlem sembolü seçin.');
    } else if(sel1===i){
      sel1=null; selOp=null; clearOps(); renderCards(); setMsg('Bir sayı seçin.');
    } else if(selOp!==null){
      doOp(sel1,i);
    } else {
      sel1=i; renderCards(); setMsg('İşlem sembolü seçin.');
    }
  }

  function selectOp(el){
    if(sel1===null){setMsg('Önce bir sayı seçin.',true);return;}
    document.querySelectorAll('.op-btn').forEach(b=>b.classList.remove('op-selected'));
    el.classList.add('op-selected');
    selOp=el.dataset.op;
    setMsg('İkinci sayıyı seçin.');
  }

  function doOp(i,j){
    const a=cards[i].val, b=cards[j].val;
    let res;
    const opSym={'+':'+','-':'−','*':'×','/':'÷'};
    switch(selOp){
      case '+': res=a+b; break;
      case '-': res=a-b; break;
      case '*': res=a*b; break;
      case '/': res=(b!==0&&a%b===0)?a/b:null; break;
    }
    if(res===null||!Number.isInteger(res)||res<=0){
      setMsg('Geçersiz işlem! Sonuç pozitif doğal sayı olmalı.',true);
      sel1=null;selOp=null;clearOps();renderCards();return;
    }
    // Geçmişe ekle
    const line=`${a} ${opSym[selOp]} ${b} = ${res}`;
    history.push(line);
    const hl=document.getElementById('historyList');
    const item=document.createElement('div');item.className='history-item';
    item.innerHTML=`<span>${res}</span> = ${a} ${opSym[selOp]} ${b}`;
    hl.appendChild(item);

    // Kartları güncelle
    cards[i].used=true; cards[j].used=true;
    const newId=cards.length;
    cards.push({val:res,id:newId,used:false,isResult:true});

    // En iyi sonucu takip et
    const diff=Math.abs(res-target);
    if(bestResult===null||diff<Math.abs(bestResult-target)) bestResult=res;

    sel1=null;selOp=null;clearOps();renderCards();

    if(res===target){
      setMsg('🎯 Hedefe ulaştınız!','good');
      document.getElementById('endBtnArea').style.display='none';
      setTimeout(()=>timeUp(false,...Object.values(G._timerCtx)),600);
    } else {
      const remaining=cards.filter(c=>!c.used);
      if(remaining.length<=1){
        // Tek kart kaldı, daha fazla işlem yapılamaz — otomatik bitir
        document.getElementById('endBtnArea').style.display='none';
        setMsg('Tüm sayılar kullanıldı.');
        setTimeout(()=>timeUp(false,...Object.values(G._timerCtx)),800);
      } else {
        setMsg('Devam edin veya süreyi bitirin.');
      }
    }
  }

  function clearOps(){
    document.querySelectorAll('.op-btn').forEach(b=>b.classList.remove('op-selected'));
    selOp=null;
  }

  // ── SKOR BAR ──
  function updateScorebar(activeP){
    const sb=document.getElementById('scorebar');
    sb.innerHTML='';
    players.forEach((name,i)=>{
      const div=document.createElement('div');
      div.className='sbox'+(i===activeP?' active-player':'');
      div.innerHTML=`<div class="sname">${name}</div><div class="sscore">${scores[i]}</div>`;
      sb.appendChild(div);
    });
  }

  function showEnd(){
    const fs=document.getElementById('finalScores');
    fs.innerHTML='';
    if(mode===1){
      const div=document.createElement('div');
      div.className='final-row winner';
      div.innerHTML=`
        <div>
          <div class="final-name">${players[0]}</div>
          <div class="final-detail">10 soruluk yarışma tamamlandı</div>
        </div>
        <div class="final-score">${scores[0]} puan</div>`;
      fs.appendChild(div);
    } else {
      const sorted=[0,1].map(i=>({name:players[i],score:scores[i],idx:i,rounds:roundScores[i]}))
        .sort((a,b)=>b.score-a.score);
      const maxScore=sorted[0].score;
      sorted.forEach((p,rank)=>{
        const isWinner=p.score===maxScore;
        const div=document.createElement('div');
        div.className='final-row'+(isWinner?' winner':'');
        div.innerHTML=`
          <div>
            <div class="final-name">${rank===0?'🏆 ':''}${p.name}</div>
            <div class="final-detail">Turlar: ${p.rounds.join(', ')}</div>
          </div>
          <div class="final-score">${p.score} puan</div>`;
        fs.appendChild(div);
      });
      if(sorted[0].score===sorted[1].score){
        const tie=document.createElement('div');
        tie.style.cssText='text-align:center;font-size:12px;color:rgba(247,242,232,0.4);padding:4px';
        tie.textContent='Berabere!';
        fs.appendChild(tie);
      }
    }
    showScreen('scEnd');
  }

  function setMsg(t, type){
    const el=document.getElementById('gameMsg');
    el.textContent=t;
    el.className='msg'+(type===true?' warn':type==='good'?' good':'');
  }

  return {showScreen,selectMode,startGame,selectCard,selectOp,timeUp,_currentPuzzle:null,_timerCtx:{}};
})();
</script>
</body>
