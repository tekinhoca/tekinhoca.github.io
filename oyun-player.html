<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oyun — Tekin Hoca</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
#ruffle-container{width:100%;height:100%;}
#ruffle-container ruffle-player{width:100%;height:100%;}
.error-msg{color:#c8960c;font-family:Georgia,serif;text-align:center;padding:60px 20px;font-size:1rem;line-height:1.7;}
</style>
</head>
<body>
<div id="ruffle-container">
  <div class="error-msg" id="errorMsg" style="display:none">Oyun yüklenemedi.<br>Lütfen sayfayı yenileyin.</div>
</div>
<script src="ruffle/ruffle.js"></script>
<script>
(function(){
  const params=new URLSearchParams(window.location.search);
  const swf=params.get('swf');
  const title=params.get('title')||'Oyun';
  document.title=title+' — Tekin Hoca';
  if(!swf){document.getElementById('errorMsg').style.display='block';return;}
  const ruffle=window.RufflePlayer&&window.RufflePlayer.newest();
  if(!ruffle){document.getElementById('errorMsg').style.display='block';return;}
  const player=ruffle.createPlayer();
  player.style.width='100%';
  player.style.height='100%';
  document.getElementById('ruffle-container').appendChild(player);
  player.load(swf);
})();
</script>
</body>
</html>
